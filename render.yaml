services:
  - type: web
    name: data-omen-api
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    # CRITICAL FIX: Pure Uvicorn is a single async process. 
    # This prevents the OS from OOM-killing the app on low-RAM instances.
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - fromGroup: data-omen-shared-config
    healthCheckPath: /health 

  - type: worker
    name: data-omen-worker
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: python compute_worker.py
    envVars:
      - fromGroup: data-omen-shared-config

envVarGroups:
  - name: data-omen-shared-config
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ENVIRONMENT
        value: production
      - key: SKIP_INSTALL_DEPS
        value: "false"