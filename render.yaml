services:
  # 1. The Orchestration Layer (Web API)
  - type: web
    name: data-omen-api
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false # Connect your Supabase connection string here
      - key: ALLOWED_ORIGINS
        sync: false # Your Vercel frontend URL
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET
        sync: false

  # 2. The Execution Layer (Background Compute Worker)
  - type: worker
    name: data-omen-worker
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python compute_worker.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ENVIRONMENT
        value: production
      # Workers inherit the same database and cloud storage access
      - fromService:
          type: web
          name: data-omen-api
          envVar: DATABASE_URL
      - fromService:
          type: web
          name: data-omen-api
          envVar: OPENAI_API_KEY
      - fromService:
          type: web
          name: data-omen-api
          envVar: STRIPE_API_KEY
      - fromService:
          type: web
          name: data-omen-api
          envVar: AWS_ACCESS_KEY_ID
      - fromService:
          type: web
          name: data-omen-api
          envVar: AWS_SECRET_ACCESS_KEY
      - fromService:
          type: web
          name: data-omen-api
          envVar: AWS_S3_BUCKET